---
# ============================================================
# Pattern 1 — Dynamic Secret (Database engine)
# ============================================================
# VSO requests fresh PostgreSQL credentials from Vault and writes them into
# the K8s Secret `db-creds`. When the lease nears expiration (renewalPercent),
# VSO renews and overwrites the Secret.
#
# NOTE: no `rolloutRestartTargets` — that's the whole point of this demo.
# The pod stays up; the sidecar container picks up the new value at runtime.
#
# If you don't want the database demo, delete this resource. The Static and PKI
# blocks below will keep working.
# vsolink:dynamic:yaml:start
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: db-creds
  namespace: vso-demo  # CHANGE: your namespace
spec:
  vaultAuthRef: vault-auth
  mount: database  # CHANGE: the database engine mount path in Vault
  path: creds/app-readonly  # CHANGE: the Vault role under that mount
  destination:
    create: true
    overwrite: true
    name: db-creds
    type: Opaque
  renewalPercent: 67
# vsolink:dynamic:yaml:end
---
# ============================================================
# Pattern 2 — Static Secret (KV v2)
# ============================================================
# VSO polls the KV path at `refreshAfter` and updates the K8s Secret in place.
# Mounted as a volume in the pod; kubelet propagates the new file content
# within its sync interval (typically <= 60s).
# vsolink:static:yaml:start
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: static-config
  namespace: vso-demo  # CHANGE: your namespace
spec:
  type: kv-v2
  mount: demo  # CHANGE: your KV v2 mount path
  path: vso-demo/static-config
  refreshAfter: 30s
  vaultAuthRef: vault-auth
  destination:
    create: true
    overwrite: true
    name: vso-demo-static-config
# vsolink:static:yaml:end
---
# ============================================================
# Pattern 3 — PKI Secret
# ============================================================
# VSO requests a TLS cert from Vault's PKI engine. When the cert has less than
# `expiryOffset` lifetime remaining, VSO issues a new one and updates the Secret.
# Mounted as a TLS Secret; kubelet remounts the files without restarting the pod.
# vsolink:pki:yaml:start
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultPKISecret
metadata:
  name: pki-cert
  namespace: vso-demo  # CHANGE: your namespace
spec:
  vaultAuthRef: vault-auth
  mount: pki-int  # CHANGE: your PKI mount path
  role: vso-demo-app
  commonName: vso-demo-app.demo.local  # CHANGE: any CN allowed by the PKI role
  ttl: 5m
  expiryOffset: 2m
  format: pem
  destination:
    create: true
    overwrite: true
    name: vso-demo-pki-cert
    type: kubernetes.io/tls
# vsolink:pki:yaml:end
