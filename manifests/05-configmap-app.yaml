---
# GERADO por tools/gen-source-links.py - NAO editar a mao.
# Bundle: app.py (== app/app.py), sidecar.sh, source_links.json (deep links GitHub).
apiVersion: v1
kind: ConfigMap
metadata:
  name: vso-demo-app-code
  namespace: vso-demo  # CHANGE: your namespace
data:
  app.py: |
    """
    vault-vso-demo-app — Flask UI showing three Vault Secrets Operator patterns
    running side-by-side in a single pod that never restarts:

      1) Dynamic Secret — PostgreSQL credentials read via a sidecar that polls
         the K8s Secret and writes the values into a shared emptyDir volume.
         The webapp re-reads the file on every request.
      2) Static Secret  — KV v2 mounted as a Secret volume. kubelet propagates
         in-place updates; the webapp re-reads the files each request.
      3) PKI Secret     — Short-lived TLS cert mounted as a Secret volume.
         VSO renews ahead of expiry; kubelet remounts the files.

    The pod's uptime counter increments forever to make it obvious that none
    of the three rotation paths require a restart.
    """
    import os
    import hashlib
    import socket
    import json
    import ssl
    import urllib.request
    from datetime import datetime, timezone, timedelta
    from urllib.parse import quote
    from zoneinfo import ZoneInfo, ZoneInfoNotFoundError

    # Render datas no MESMO formato da UI do Vault ("May 28 2026 14:41:03 PM GMT-03:00")
    # pra comparação visual byte-a-byte com o que aparece em /ui/vault/secrets/pki-int/.
    # APP_TZ permite override; default São Paulo (demo BR).
    try:
        LOCAL_TZ = ZoneInfo(os.getenv("APP_TZ", "America/Sao_Paulo"))
    except ZoneInfoNotFoundError:
        LOCAL_TZ = timezone(timedelta(hours=-3))


    def _fmt_dt_like_vault_ui(dt_utc):
        """Formata um datetime UTC como a UI do Vault: 'May 28 2026 14:41:03 PM GMT-03:00'."""
        local = dt_utc.astimezone(LOCAL_TZ)
        off_s = int(local.utcoffset().total_seconds())
        sign = '+' if off_s >= 0 else '-'
        h = abs(off_s) // 3600
        m = (abs(off_s) % 3600) // 60
        return local.strftime("%b %d %Y %H:%M:%S %p") + f" GMT{sign}{h:02d}:{m:02d}"

    from flask import Flask, render_template_string, jsonify
    from cryptography import x509
    from cryptography.hazmat.primitives import hashes
    from pygments import highlight
    from pygments.lexers import JsonLexer
    from pygments.formatters import HtmlFormatter

    app = Flask(__name__)
    POD_START = datetime.now(timezone.utc)
    POD_NAME = os.getenv("HOSTNAME", socket.gethostname())

    # Paths populated by the sidecar / kubelet.
    CREDS_FILE = "/shared/credentials.txt"   # written by the sidecar
    STATIC_DIR = "/static-config"            # mounted from VaultStaticSecret
    PKI_CRT = "/tls/tls.crt"                 # mounted from VaultPKISecret

    counter = 0

    # Static metadata about how this pod connects to Vault. Sourced from env
    # vars set on the Deployment — read once at boot.
    VAULT_META = {
        "sa_name": os.getenv("SA_NAME", "app-sidecar"),
        "vault_addr": os.getenv("VAULT_ADDR", "n/a"),
        # Public Vault UI URL (different from VAULT_ADDR, which is the internal cluster
        # address the app uses to TALK to Vault). Falls back to VAULT_ADDR so the links
        # always point somewhere.
        "vault_ui_addr": os.getenv("VAULT_UI_ADDR", os.getenv("VAULT_ADDR", "n/a")).rstrip("/"),
        "vault_auth_mount": os.getenv("VAULT_AUTH_MOUNT", "n/a"),
        "vault_auth_role": os.getenv("VAULT_AUTH_ROLE", "n/a"),
        "vault_db_mount": os.getenv("VAULT_DB_MOUNT", "n/a"),
        "vault_db_role": os.getenv("VAULT_DB_ROLE", "n/a"),
        "vault_db_ttl": os.getenv("VAULT_DB_TTL", "90s"),
        "vault_kv_mount": os.getenv("VAULT_KV_MOUNT", "n/a"),
        "vault_kv_path": os.getenv("VAULT_KV_PATH", "n/a"),
        "vault_kv_type": os.getenv("VAULT_KV_TYPE", "kv-v2"),
        "vault_kv_refresh": os.getenv("VAULT_KV_REFRESH", "30s"),
        "vault_pki_mount": os.getenv("VAULT_PKI_MOUNT", "n/a"),
        "vault_pki_role": os.getenv("VAULT_PKI_ROLE", "n/a"),
        "vault_pki_cn": os.getenv("VAULT_PKI_CN", "n/a"),
        "vault_pki_ttl": os.getenv("VAULT_PKI_TTL", "5m"),
        "vault_pki_expiry_offset": os.getenv("VAULT_PKI_EXPIRY_OFFSET", "2m"),
    }

    # Direct Vault UI URLs por pattern. Computed once at boot from the env vars.
    # Note: o `/` em paths KV multi-segmento (ex.: "vso-demo/static-config") precisa
    # ser %2F-encoded pra UI casar com a rota Ember.js do KV v2.
    _UI = VAULT_META["vault_ui_addr"]
    # DB:  página "Generate Credentials" da role (Vault 1.18+ database engine).
    # KV:  details do secret KV v2 (path %2F-encoded p/ casar com a rota Ember).
    # PKI: link específico do CERT ATUAL (por serial) — computado por request no
    #      index() porque o serial muda a cada renovação (default 5min). Não há
    #      link "estático" porque a rota de role config (/pki/roles/<r>/details)
    #      não bate com nada navegável na UI 1.18+ desta instalação.
    VAULT_META["vault_ui_db_url"] = (
        f"{_UI}/ui/vault/secrets/{VAULT_META['vault_db_mount']}/credentials/{VAULT_META['vault_db_role']}"
    )
    VAULT_META["vault_ui_kv_url"] = (
        f"{_UI}/ui/vault/secrets/{VAULT_META['vault_kv_mount']}/kv/"
        f"{quote(VAULT_META['vault_kv_path'], safe='')}/details"
    )


    def _pki_cert_ui_url(serial_hex: str) -> str:
        """URL pro cert ATUAL na UI Vault (pki engine), por serial.

        Vault UI espera o serial em hex separado por `:` (formato openssl).
        A página mostra subject/issuer/validade/extensions — o mesmo que a app exibe.
        Retorna "" se ainda não há cert (boot inicial); template esconde a linha.
        """
        if not serial_hex:
            return ""
        colonized = ":".join(serial_hex[i:i + 2] for i in range(0, len(serial_hex), 2))
        return (
            f"{_UI}/ui/vault/secrets/{VAULT_META['vault_pki_mount']}"
            f"/pki/certificates/{colonized}/details"
        )


    # Deep links to the exact source lines on GitHub. Generated by
    # tools/gen-source-links.py into source_links.json (mounted next to app.py).
    try:
        with open(os.path.join(os.path.dirname(os.path.abspath(__file__)), "source_links.json")) as _f:
            SOURCE_LINKS = json.load(_f)
    except Exception:
        SOURCE_LINKS = {}


    def src_links(pattern):
        """HTML 'view on GitHub' links (code + secret YAML) for a pattern block."""
        l = SOURCE_LINKS.get(pattern, {})
        parts = []
        if l.get("code"):
            parts.append('<a href="%s" target="_blank" rel="noopener">code (app.py)</a>' % l["code"])
        if l.get("yaml"):
            parts.append('<a href="%s" target="_blank" rel="noopener">secret YAML</a>' % l["yaml"])
        return ('<div class="srclinks">&#128279; view on GitHub: '
                + ' &middot; '.join(parts) + '</div>') if parts else ""


    # vsolink:dynamic:code:start
    def read_credentials():
        """Read DB credentials from the shared volume (refreshed by the sidecar)."""
        try:
            with open(CREDS_FILE, "r") as f:
                data = {}
                for line in f:
                    if "=" in line:
                        k, v = line.strip().split("=", 1)
                        data[k] = v
                return data
        except FileNotFoundError:
            return {}
    # vsolink:dynamic:code:end


    # vsolink:static:code:start
    def read_static_config():
        """Read the static config Secret directory (mounted by VSO Static)."""
        if not os.path.isdir(STATIC_DIR):
            return {"_status": "waiting for VSO to sync..."}
        result = {}
        try:
            for key in sorted(os.listdir(STATIC_DIR)):
                if key.startswith("."):
                    continue
                path = os.path.join(STATIC_DIR, key)
                if os.path.isfile(path):
                    with open(path) as f:
                        result[key] = f.read().strip()
            return result if result else {"_status": "secret is empty"}
        except Exception as e:
            return {"_error": str(e)}
    # vsolink:static:code:end


    # vsolink:pki:code:start
    def read_pki_cert():
        """Parse o cert PKI emitido (renovado pelo VSO antes do expiry).

        Os campos foram alinhados 1:1 com a tela 'View Certificate' da UI Vault
        (`/ui/vault/secrets/<pki>/pki/certificates/<serial>/details`): mesmos labels,
        mesmo formato. Comparar visual fica trivial; campos extras (issuer,
        signature_algorithm, public_key_size_bits, fingerprint, remaining_seconds)
        ficam abaixo — vêm do mesmo PEM que a UI deixa pra download.
        """
        if not os.path.isfile(PKI_CRT):
            return {"_status": "waiting for certificate issuance..."}
        try:
            with open(PKI_CRT, "rb") as f:
                pem = f.read()
            cert = x509.load_pem_x509_certificate(pem)

            # Common Name (subject/issuer) — UI mostra só o CN, não o DN completo
            def _cn(name):
                attrs = name.get_attributes_for_oid(x509.NameOID.COMMON_NAME)
                return attrs[0].value if attrs else name.rfc4514_string()

            # Key Usage — formato "DigitalSignature, KeyEncipherment" (como UI)
            try:
                ku = cert.extensions.get_extension_for_class(x509.KeyUsage).value
                ku_flags = [
                    ("DigitalSignature",  "digital_signature"),
                    ("ContentCommitment", "content_commitment"),
                    ("KeyEncipherment",   "key_encipherment"),
                    ("DataEncipherment",  "data_encipherment"),
                    ("KeyAgreement",      "key_agreement"),
                    ("KeyCertSign",       "key_cert_sign"),
                    ("CrlSign",           "crl_sign"),
                ]
                key_usage = ", ".join(label for label, attr in ku_flags if getattr(ku, attr, False)) or "(none)"
            except x509.ExtensionNotFound:
                key_usage = "(absent)"

            # Subject Alternative Names — separados por vírgula (como UI)
            try:
                san_ext = cert.extensions.get_extension_for_class(x509.SubjectAlternativeName).value
                sans = ", ".join(str(n.value) for n in san_ext)
            except x509.ExtensionNotFound:
                sans = "(absent)"

            # Use PSS — UI mostra "Yes"/"No" pra RSA-PSS
            sig_name = cert.signature_algorithm_oid._name
            use_pss = "Yes" if "pss" in sig_name.lower() else "No"

            # Serial — UI usa ':' a cada 2 hex chars (formato openssl)
            serial_hex = format(cert.serial_number, "x")
            serial_colon = ":".join(serial_hex[i:i + 2] for i in range(0, len(serial_hex), 2))

            # Fingerprint — também ':' a cada 2
            fp = cert.fingerprint(hashes.SHA256()).hex()
            fp_colon = ":".join(fp[i:i + 2] for i in range(0, len(fp), 2))

            now = datetime.now(timezone.utc)
            remaining_s = int((cert.not_valid_after_utc - now).total_seconds())

            return {
                # Mesmos labels da UI Vault (mesma ordem):
                "common_name": _cn(cert.subject),
                "serial_number": serial_colon,
                "key_usage": key_usage,
                "subject_alternative_names": sans,
                "use_pss": use_pss,
                "not_valid_before": _fmt_dt_like_vault_ui(cert.not_valid_before_utc),
                "not_valid_after": _fmt_dt_like_vault_ui(cert.not_valid_after_utc),
                # Extras úteis (UI não mostra como label — só via PEM):
                "issuer": _cn(cert.issuer),
                "remaining_seconds": remaining_s,
                "signature_algorithm": sig_name,
                "public_key_size_bits": cert.public_key().key_size,
                "fingerprint_sha256": fp_colon,
                # Privado: serial em hex puro pra construir URL (template/JSON ignora _*)
                "_serial_hex_for_url": serial_hex,
            }
        except Exception as e:
            return {"_error": str(e)}
    # vsolink:pki:code:end


    def hl_json(data):
        """Render a dict as jq-like syntax-highlighted JSON via Pygments."""
        js = json.dumps(data, indent=2, ensure_ascii=False, sort_keys=False)
        return highlight(js, JsonLexer(),
                         HtmlFormatter(style="monokai", noclasses=True, nobackground=True))


    def pwd_hash(pwd):
        if not pwd:
            return "n/a"
        h = hashlib.sha256(pwd.encode()).hexdigest()
        return f"sha256:{h[:12]}"


    # ============================================================
    # Transform secrets engine — FPE / Masking / Tokenization.
    # Diferente dos blocos VSO (leitura passiva de secret montado): aqui o app
    # CHAMA a API do Vault (transform/encode|decode) com VAULT_TRANSFORM_TOKEN.
    # ============================================================
    _TRANSFORM_ROLE = os.getenv("VAULT_TRANSFORM_ROLE", "cd-testdata")
    _TRANSFORM_TOKEN = os.getenv("VAULT_TRANSFORM_TOKEN", "")
    VAULT_META["vault_ui_transform_url"] = f"{_UI}/ui/vault/secrets/transform/list"
    _SSL_NOVERIFY = ssl.create_default_context()
    _SSL_NOVERIFY.check_hostname = False
    _SSL_NOVERIFY.verify_mode = ssl.CERT_NONE


    def _transform(transformation, value, decode=False):
        """POST transform/encode|decode/<role> no Vault; retorna o valor transformado."""
        op = "decode" if decode else "encode"
        addr = VAULT_META["vault_addr"].rstrip("/")
        body = json.dumps({"transformation": transformation, "value": value}).encode()
        req = urllib.request.Request(
            f"{addr}/v1/transform/{op}/{_TRANSFORM_ROLE}",
            data=body, method="POST",
            headers={"X-Vault-Token": _TRANSFORM_TOKEN, "Content-Type": "application/json"},
        )
        with urllib.request.urlopen(req, context=_SSL_NOVERIFY, timeout=5) as r:
            data = json.load(r)["data"]
        return data["decoded_value"] if decode else data["encoded_value"]


    # vsolink:transform-fpe:code:start
    def demo_fpe():
        """FPE (FF3-1, NIST SP 800-38G): cifra preservando o FORMATO, REVERSIVEL. Ex.: CPF."""
        original = os.getenv("DEMO_CPF", "123.456.789-09")
        try:
            enc = _transform("cpf-fpe", original)
            dec = _transform("cpf-fpe", enc, decode=True)
            return {"transformation": "cpf-fpe", "tipo": "FPE / FF3-1",
                    "original": original, "transformado": enc, "decifrado": dec,
                    "reversivel": True, "round_trip_ok": dec == original}
        except Exception as e:
            return {"_error": str(e), "_dica": "VAULT_TRANSFORM_TOKEN setado? transform/ acessivel?"}
    # vsolink:transform-fpe:code:end


    # vsolink:transform-mask:code:start
    def demo_masking():
        """Masking: ofuscacao IRREVERSIVEL (logs/dashboards). Cartao preservando BIN+last4."""
        original = os.getenv("DEMO_CARD", "4111-1111-1111-1111")
        try:
            masked = _transform("card-mask", original)
            return {"transformation": "card-mask", "tipo": "Masking (irreversivel)",
                    "original": original, "transformado": masked, "reversivel": False}
        except Exception as e:
            return {"_error": str(e)}
    # vsolink:transform-mask:code:end


    # vsolink:transform-token:code:start
    def demo_tokenization():
        """Tokenization: token HMAC convergente, REVERSIVEL, sem expor o dado original."""
        original = os.getenv("DEMO_PII", "Rua das Flores, 123, Sao Paulo, SP")
        try:
            tok = _transform("pii-token", original)
            dec = _transform("pii-token", tok, decode=True)
            return {"transformation": "pii-token", "tipo": "Tokenization (reversivel)",
                    "original": original, "transformado": tok, "decifrado": dec,
                    "reversivel": True, "round_trip_ok": dec == original}
        except Exception as e:
            return {"_error": str(e)}
    # vsolink:transform-token:code:end


    PAGE = """<!DOCTYPE html><html lang="en"><head>
