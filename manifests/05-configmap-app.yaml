    <script>
    (function(){
      var STORAGE_KEY_ON = 'vsoDemoAutoRefresh';
      var STORAGE_KEY_INT = 'vsoDemoRefreshInterval';
      var on = localStorage.getItem(STORAGE_KEY_ON) !== 'off';
      var intervalSec = parseInt(localStorage.getItem(STORAGE_KEY_INT) || '10', 10);
      if (isNaN(intervalSec)) intervalSec = 10;
      var remaining = intervalSec;
      function render() {
        var btn = document.getElementById('toggleBtn');
        var cd = document.getElementById('countdown');
        var sel = document.getElementById('intervalSel');
        if (sel) sel.value = intervalSec === 0 ? '0' : String(intervalSec);
        if (intervalSec === 0) {
          btn.textContent = 'Manual mode';
          btn.className = 'off';
          cd.textContent = 'manual refresh only';
          return;
        }
        if (on) {
          btn.textContent = 'Pausar auto-refresh';
          btn.className = 'on';
          cd.textContent = 'próximo: ' + remaining + 's';
        } else {
          btn.textContent = 'Resume auto-refresh';
          btn.className = 'off';
          cd.textContent = 'pausado';
        }
      }
      function tick() {
        if (!on || intervalSec === 0) return;
        remaining--;
        if (remaining <= 0) { window.location.reload(); return; }
        render();
      }
      window.toggleAuto = function() {
        on = !on;
        localStorage.setItem(STORAGE_KEY_ON, on ? 'on' : 'off');
        remaining = intervalSec;
        render();
      };
      window.changeInterval = function() {
        var v = parseInt(document.getElementById('intervalSel').value, 10);
        intervalSec = v;
        localStorage.setItem(STORAGE_KEY_INT, String(v));
        remaining = v;
        render();
      };
      render();
      setInterval(tick, 1000);
    })();
    window.togglePwd = function(){
      var el = document.getElementById('pwdPlain');
      var btn = document.getElementById('pwdBtn');
      if (!el || !btn) return;
      if (el.hasAttribute('hidden')) {
        el.removeAttribute('hidden');
        btn.textContent = 'esconder senha';
        btn.classList.add('on');
      } else {
        el.setAttribute('hidden','');
        btn.textContent = 'mostrar senha';
        btn.classList.remove('on');
      }
    };
    (function(){
      var STORAGE_KEY = 'vsoDemoBoxOpen';
      var open = {};
      try { open = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch (e) { open = {}; }
      document.querySelectorAll('details.box[data-box]').forEach(function(el){
        var key = el.getAttribute('data-box');
        if (open[key]) el.setAttribute('open','');
        el.addEventListener('toggle', function(){
          open[key] = el.open;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(open)); } catch (e) {}
        });
      });
    })();
    </script>
    </body></html>"""


