# GERADO por tools/gen-source-links.py - NAO editar a mao.
# Bundle: app.py (== app/app.py), sidecar.sh, source_links.json (deep links GitHub).
apiVersion: v1
kind: ConfigMap
metadata:
  name: vso-demo-app-code
  namespace: vso-demo  # CHANGE: your namespace
data:
  app.py: |
    """
    vault-vso-demo-app — Flask UI showing three Vault Secrets Operator patterns
    running side-by-side in a single pod that never restarts:

      1) Dynamic Secret — PostgreSQL credentials read via a sidecar that polls
         the K8s Secret and writes the values into a shared emptyDir volume.
         The webapp re-reads the file on every request.
      2) Static Secret  — KV v2 mounted as a Secret volume. kubelet propagates
         in-place updates; the webapp re-reads the files each request.
      3) PKI Secret     — Short-lived TLS cert mounted as a Secret volume.
         VSO renews ahead of expiry; kubelet remounts the files.

    The pod's uptime counter increments forever to make it obvious that none
    of the three rotation paths require a restart.
    """
    import os
    import hashlib
    import socket
    import json
    from datetime import datetime, timezone

    from flask import Flask, render_template_string, jsonify
    from cryptography import x509
    from cryptography.hazmat.primitives import hashes
    from pygments import highlight
    from pygments.lexers import JsonLexer
    from pygments.formatters import HtmlFormatter

    app = Flask(__name__)
    POD_START = datetime.now(timezone.utc)
    POD_NAME = os.getenv("HOSTNAME", socket.gethostname())

    # Paths populated by the sidecar / kubelet.
    CREDS_FILE = "/shared/credentials.txt"   # written by the sidecar
    STATIC_DIR = "/static-config"            # mounted from VaultStaticSecret
    PKI_CRT = "/tls/tls.crt"                 # mounted from VaultPKISecret

    counter = 0

    # Static metadata about how this pod connects to Vault. Sourced from env
    # vars set on the Deployment — read once at boot.
    VAULT_META = {
        "sa_name": os.getenv("SA_NAME", "app-sidecar"),
        "vault_addr": os.getenv("VAULT_ADDR", "n/a"),
        "vault_auth_mount": os.getenv("VAULT_AUTH_MOUNT", "n/a"),
        "vault_auth_role": os.getenv("VAULT_AUTH_ROLE", "n/a"),
        "vault_db_mount": os.getenv("VAULT_DB_MOUNT", "n/a"),
        "vault_db_role": os.getenv("VAULT_DB_ROLE", "n/a"),
        "vault_db_ttl": os.getenv("VAULT_DB_TTL", "90s"),
        "vault_kv_mount": os.getenv("VAULT_KV_MOUNT", "n/a"),
        "vault_kv_path": os.getenv("VAULT_KV_PATH", "n/a"),
        "vault_kv_type": os.getenv("VAULT_KV_TYPE", "kv-v2"),
        "vault_kv_refresh": os.getenv("VAULT_KV_REFRESH", "30s"),
        "vault_pki_mount": os.getenv("VAULT_PKI_MOUNT", "n/a"),
        "vault_pki_role": os.getenv("VAULT_PKI_ROLE", "n/a"),
        "vault_pki_cn": os.getenv("VAULT_PKI_CN", "n/a"),
        "vault_pki_ttl": os.getenv("VAULT_PKI_TTL", "5m"),
        "vault_pki_expiry_offset": os.getenv("VAULT_PKI_EXPIRY_OFFSET", "2m"),
    }


    # Deep links to the exact source lines on GitHub. Generated by
    # tools/gen-source-links.py into source_links.json (mounted next to app.py).
    try:
        with open(os.path.join(os.path.dirname(os.path.abspath(__file__)), "source_links.json")) as _f:
            SOURCE_LINKS = json.load(_f)
    except Exception:
        SOURCE_LINKS = {}


    def src_links(pattern):
        """HTML 'view on GitHub' links (code + secret YAML) for a pattern block."""
        l = SOURCE_LINKS.get(pattern, {})
        parts = []
        if l.get("code"):
            parts.append('<a href="%s" target="_blank" rel="noopener">code (app.py)</a>' % l["code"])
        if l.get("yaml"):
            parts.append('<a href="%s" target="_blank" rel="noopener">secret YAML</a>' % l["yaml"])
        return ('<div class="srclinks">&#128279; view on GitHub: '
                + ' &middot; '.join(parts) + '</div>') if parts else ""


    # vsolink:dynamic:code:start
    def read_credentials():
        """Read DB credentials from the shared volume (refreshed by the sidecar)."""
        try:
            with open(CREDS_FILE, "r") as f:
                data = {}
                for line in f:
                    if "=" in line:
                        k, v = line.strip().split("=", 1)
                        data[k] = v
                return data
        except FileNotFoundError:
            return {}
    # vsolink:dynamic:code:end


    # vsolink:static:code:start
    def read_static_config():
        """Read the static config Secret directory (mounted by VSO Static)."""
        if not os.path.isdir(STATIC_DIR):
            return {"_status": "waiting for VSO to sync..."}
        result = {}
        try:
            for key in sorted(os.listdir(STATIC_DIR)):
                if key.startswith("."):
                    continue
                path = os.path.join(STATIC_DIR, key)
                if os.path.isfile(path):
                    with open(path) as f:
                        result[key] = f.read().strip()
            return result if result else {"_status": "secret is empty"}
        except Exception as e:
            return {"_error": str(e)}
    # vsolink:static:code:end


    # vsolink:pki:code:start
    def read_pki_cert():
        """Parse the PKI cert (renewed by VSO before expiry)."""
        if not os.path.isfile(PKI_CRT):
            return {"_status": "waiting for certificate issuance..."}
        try:
            with open(PKI_CRT, "rb") as f:
                pem = f.read()
            cert = x509.load_pem_x509_certificate(pem)
            fp = cert.fingerprint(hashes.SHA256()).hex()
            now = datetime.now(timezone.utc)
            remaining_s = int((cert.not_valid_after_utc - now).total_seconds())
            return {
                "subject": cert.subject.rfc4514_string(),
                "issuer": cert.issuer.rfc4514_string(),
                "serial_hex": format(cert.serial_number, "x"),
                "not_valid_before_utc": cert.not_valid_before_utc.isoformat(),
                "not_valid_after_utc": cert.not_valid_after_utc.isoformat(),
                "remaining_seconds": remaining_s,
                "signature_algorithm": cert.signature_algorithm_oid._name,
                "public_key_size_bits": cert.public_key().key_size,
                "fingerprint_sha256": ":".join(fp[i:i + 2] for i in range(0, len(fp), 2)),
            }
        except Exception as e:
            return {"_error": str(e)}
    # vsolink:pki:code:end


    def hl_json(data):
        """Render a dict as jq-like syntax-highlighted JSON via Pygments."""
        js = json.dumps(data, indent=2, ensure_ascii=False, sort_keys=False)
        return highlight(js, JsonLexer(),
                         HtmlFormatter(style="monokai", noclasses=True, nobackground=True))


    def pwd_hash(pwd):
        if not pwd:
            return "n/a"
        h = hashlib.sha256(pwd.encode()).hexdigest()
        return f"sha256:{h[:12]}"


    PAGE = """<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8"><title>Vault Secrets Operator — three patterns, one pod</title>
    <style>
    body{font-family:-apple-system,Segoe UI,sans-serif;max-width:920px;margin:1.5em auto;padding:1.5em;background:#0f172a;color:#e2e8f0}
    h1{color:#a855f7;margin:0 0 .3em 0;font-size:1.7em}
    .sub{color:#94a3b8;margin-bottom:1.5em}
    .box{background:#1e293b;padding:1.2em 1.5em;border-radius:10px;margin:.8em 0;border-left:4px solid #3b82f6}
    .box.cred{border-color:#22c55e}
    .box.timer{border-color:#fbbf24}
    .box.flow{border-color:#a855f7;font-size:.95em}
    .box.static{border-color:#0ea5e9}
    .box.pki{border-color:#f43f5e}
    .jq{font-family:'SF Mono',Consolas,monospace;font-size:.85em;line-height:1.5;background:#0b1220;padding:1em;border-radius:6px;overflow-x:auto;margin:.5em 0}
    .jq pre{margin:0;color:#e2e8f0}
    .hint{color:#94a3b8;font-size:.8em;margin-top:.4em;font-style:italic}
    .label{color:#64748b;font-size:.78em;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4em}
    .val{font-family:'SF Mono',Consolas,monospace;font-size:1em;line-height:1.6;word-break:break-all;color:#f1f5f9}
    .big{font-size:1.3em;font-weight:600;color:#22c55e}
    .timer-big{font-size:2em;font-weight:600;color:#fbbf24;font-family:'SF Mono',Consolas,monospace}
    .step{margin:.3em 0;padding-left:1.5em;text-indent:-1.5em}
    .step::before{content:"\\2192 ";color:#a855f7}
    .pod{color:#7dd3fc;font-family:'SF Mono',Consolas,monospace}
    .footer{margin-top:2em;color:#64748b;font-size:.75em;text-align:center}
    .controls{position:sticky;top:0;background:#1e293b;padding:.8em 1em;border-radius:8px;margin:0 0 1.2em 0;display:flex;align-items:center;gap:1em;flex-wrap:wrap;border:1px solid #334155;z-index:10}
    .controls button{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:.5em 1em;border-radius:6px;font-size:.9em;cursor:pointer;font-family:inherit;transition:all .15s}
    .controls button:hover{background:#475569}
    .controls button.on{background:#22c55e;border-color:#16a34a;color:#0f172a;font-weight:600}
    .controls button.off{background:#ef4444;border-color:#b91c1c;color:white;font-weight:600}
    .controls .countdown{color:#fbbf24;font-family:'SF Mono',Consolas,monospace;font-size:.9em;margin-left:auto}
    .controls select{background:#0b1220;color:#e2e8f0;border:1px solid #475569;padding:.45em .7em;border-radius:6px;font-size:.9em;font-family:inherit}
    details.box{padding:0}
    details.box>summary{list-style:none;cursor:pointer;padding:1.2em 1.5em;display:flex;align-items:center;gap:.7em;border-radius:10px;user-select:none}
    details.box>summary::-webkit-details-marker{display:none}
    details.box>summary::marker{display:none}
    details.box[open]>summary{border-radius:10px 10px 0 0;border-bottom:1px solid #334155}
    details.box>summary .chev{display:inline-block;transition:transform .18s ease;color:#94a3b8;font-size:1em;flex:0 0 auto}
    details.box[open]>summary .chev{transform:rotate(90deg)}
    details.box>summary .label{margin-bottom:0;flex:1}
    details.box>.box-content{padding:1em 1.5em 1.2em 1.5em}
    .reveal-btn{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:.15em .65em;border-radius:5px;font-size:.78em;cursor:pointer;font-family:inherit;margin-left:.6em;vertical-align:middle}
    .reveal-btn:hover{background:#475569}
    .reveal-btn.on{background:#fbbf24;border-color:#d97706;color:#0f172a;font-weight:600}
    .pwd-plain .big.plain{color:#fbbf24;font-family:'SF Mono',Consolas,monospace}
    .meta-grid{margin-top:.9em;border-top:1px dashed #334155;padding-top:.7em}
    .meta-h{color:#a855f7;font-size:.78em;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5em;font-weight:600}
    .meta-row{display:flex;justify-content:space-between;align-items:baseline;gap:1em;padding:.18em 0;font-size:.88em;border-bottom:1px solid #1e293b}
    .meta-row:last-child{border-bottom:0}
    .meta-k{color:#94a3b8;flex:0 0 auto}
    .meta-v{font-family:'SF Mono',Consolas,monospace;color:#7dd3fc;text-align:right;word-break:break-all}
    .srclinks{margin-top:.8em;border-top:1px dashed #334155;padding-top:.6em;font-size:.82em;color:#64748b}
    .srclinks a{color:#7dd3fc;text-decoration:none;border-bottom:1px dotted #475569}
    .srclinks a:hover{color:#a855f7;border-color:#a855f7}
    </style>
    </head><body>
    <h1>Vault Secrets Operator &mdash; three patterns, zero restarts</h1>
    <p class="sub">One pod consumes secrets from Vault through three different VSO resources (Dynamic, Static, PKI). Each block below re-reads its source on every request. The pod uptime counter just keeps growing.</p>

    <div class="controls">
      <button id="toggleBtn" onclick="toggleAuto()">Pause auto-refresh</button>
      <button onclick="window.location.reload()">Refresh now</button>
      <label>Interval:
        <select id="intervalSel" onchange="changeInterval()">
          <option value="3">3s (fast)</option>
          <option value="10" selected>10s (default)</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
          <option value="0">manual</option>
        </select>
      </label>
      <span class="countdown" id="countdown">next: 10s</span>
    </div>

    <details class="box cred" data-box="cred">
      <summary><span class="chev">&#9656;</span><div class="label">Pattern 1 &mdash; Dynamic Secret (PostgreSQL via sidecar)</div></summary>
      <div class="box-content">
        <div class="val">DB user: <span class="big">{{ db_user }}</span></div>
        <div class="val">
          Password (sha256, 12 chars): <span class="big">{{ pwd_fp }}</span>
          <button class="reveal-btn" type="button" onclick="togglePwd()" id="pwdBtn">show plain password</button>
        </div>
        <div class="val pwd-plain" id="pwdPlain" hidden>Plain password: <span class="big plain">{{ pwd_plain }}</span></div>
        <div class="val">Last sidecar update: {{ updated }}</div>

        <div class="meta-grid">
          <div class="meta-h">How this app connects to Vault</div>
          <div class="meta-row"><span class="meta-k">ServiceAccount</span><span class="meta-v">{{ sa_name }}</span></div>
          <div class="meta-row"><span class="meta-k">VaultConnection address</span><span class="meta-v">{{ vault_addr }}</span></div>
          <div class="meta-row"><span class="meta-k">VaultAuth mount / role</span><span class="meta-v">{{ vault_auth_mount }} &middot; {{ vault_auth_role }}</span></div>
          <div class="meta-row"><span class="meta-k">Database engine mount / role</span><span class="meta-v">{{ vault_db_mount }} &middot; {{ vault_db_role }}</span></div>
          <div class="meta-row"><span class="meta-k">Configured lease TTL</span><span class="meta-v">{{ vault_db_ttl }}</span></div>
        </div>
        <div class="hint">Chain: SA <code>{{ sa_name }}</code> presents its JWT to auth mount <code>{{ vault_auth_mount }}</code>, gets back a Vault token authorized to read <code>{{ vault_db_mount }}/creds/{{ vault_db_role }}</code>. VSO renews the lease before TTL expires and rewrites K8s Secret <code>db-creds</code>; the sidecar (bitnami/kubectl) copies it into <code>/shared/credentials.txt</code>; Flask re-reads on each request.</div>
        {{ dynamic_links|safe }}
      </div>
    </details>

    <div class="box timer">
      <div class="label">Pod uptime</div>
      <div class="timer-big">{{ uptime }}</div>
      <div class="val">started at {{ pod_start }} &middot; pod: <span class="pod">{{ pod_name }}</span></div>
      <div class="val">If this number only grows, the pod has never restarted.</div>
    </div>

    <details class="box static" data-box="static">
      <summary><span class="chev">&#9656;</span><div class="label">Pattern 2 &mdash; Static Secret (KV v2, refreshAfter 30s)</div></summary>
      <div class="box-content">
        <div class="jq">{{ static_html|safe }}</div>
        <div class="hint">Edit the KV path in Vault and the UI picks it up within ~30s. No pod restart.</div>

        <div class="meta-grid">
          <div class="meta-h">How this app connects to Vault</div>
          <div class="meta-row"><span class="meta-k">ServiceAccount</span><span class="meta-v">{{ sa_name }}</span></div>
          <div class="meta-row"><span class="meta-k">VaultConnection address</span><span class="meta-v">{{ vault_addr }}</span></div>
          <div class="meta-row"><span class="meta-k">VaultAuth mount / role</span><span class="meta-v">{{ vault_auth_mount }} &middot; {{ vault_auth_role }}</span></div>
          <div class="meta-row"><span class="meta-k">KV engine mount / path</span><span class="meta-v">{{ vault_kv_mount }} &middot; {{ vault_kv_path }}</span></div>
          <div class="meta-row"><span class="meta-k">KV engine type</span><span class="meta-v">{{ vault_kv_type }}</span></div>
          <div class="meta-row"><span class="meta-k">refreshAfter</span><span class="meta-v">{{ vault_kv_refresh }}</span></div>
        </div>
        {{ static_links|safe }}
      </div>
    </details>

    <details class="box pki" data-box="pki">
      <summary><span class="chev">&#9656;</span><div class="label">Pattern 3 &mdash; PKI Secret (TTL 5m, expiryOffset 2m)</div></summary>
      <div class="box-content">
        <div class="jq">{{ pki_html|safe }}</div>
        <div class="hint">Serial and validity window rotate every ~3 minutes. VSO renews the cert, kubelet remounts the files, the pod keeps running.</div>

        <div class="meta-grid">
          <div class="meta-h">How this app connects to Vault</div>
          <div class="meta-row"><span class="meta-k">ServiceAccount</span><span class="meta-v">{{ sa_name }}</span></div>
          <div class="meta-row"><span class="meta-k">VaultConnection address</span><span class="meta-v">{{ vault_addr }}</span></div>
          <div class="meta-row"><span class="meta-k">VaultAuth mount / role</span><span class="meta-v">{{ vault_auth_mount }} &middot; {{ vault_auth_role }}</span></div>
          <div class="meta-row"><span class="meta-k">PKI engine mount / role</span><span class="meta-v">{{ vault_pki_mount }} &middot; {{ vault_pki_role }}</span></div>
          <div class="meta-row"><span class="meta-k">Requested CommonName</span><span class="meta-v">{{ vault_pki_cn }}</span></div>
          <div class="meta-row"><span class="meta-k">Cert TTL / expiryOffset</span><span class="meta-v">{{ vault_pki_ttl }} &middot; renew {{ vault_pki_expiry_offset }} early</span></div>
        </div>
        {{ pki_links|safe }}
      </div>
    </details>

    <details class="box flow" data-box="flow">
      <summary><span class="chev">&#9656;</span><div class="label">Sidecar pattern (Pattern 1 only)</div></summary>
      <div class="box-content">
        <div class="step">VaultDynamicSecret requests fresh DB credentials with a short TTL.</div>
        <div class="step">Sidecar (kubectl) reads Secret <code>db-creds</code> every 3s.</div>
        <div class="step">Sidecar writes <code>/shared/credentials.txt</code> on a shared <code>emptyDir</code>.</div>
        <div class="step">Webapp re-reads the file on each HTTP request.</div>
        <div class="step">VSO renews the lease at <code>renewalPercent</code> &rarr; Secret updated &rarr; sidecar picks it up within 3s.</div>
        <div class="step"><strong>Pod uptime keeps increasing. No restart. No request loss.</strong></div>
      </div>
    </details>

    <div class="footer">request #{{ counter }} &middot; refresh controls at the top</div>
    <script>
    (function(){
      var STORAGE_KEY_ON = 'vsoDemoAutoRefresh';
      var STORAGE_KEY_INT = 'vsoDemoRefreshInterval';
      var on = localStorage.getItem(STORAGE_KEY_ON) !== 'off';
      var intervalSec = parseInt(localStorage.getItem(STORAGE_KEY_INT) || '10', 10);
      if (isNaN(intervalSec)) intervalSec = 10;
      var remaining = intervalSec;
      function render() {
        var btn = document.getElementById('toggleBtn');
        var cd = document.getElementById('countdown');
        var sel = document.getElementById('intervalSel');
        if (sel) sel.value = intervalSec === 0 ? '0' : String(intervalSec);
        if (intervalSec === 0) {
          btn.textContent = 'Manual mode';
          btn.className = 'off';
          cd.textContent = 'manual refresh only';
          return;
        }
        if (on) {
          btn.textContent = 'Pause auto-refresh';
          btn.className = 'on';
          cd.textContent = 'next: ' + remaining + 's';
        } else {
          btn.textContent = 'Resume auto-refresh';
          btn.className = 'off';
          cd.textContent = 'paused';
        }
      }
      function tick() {
        if (!on || intervalSec === 0) return;
        remaining--;
        if (remaining <= 0) { window.location.reload(); return; }
        render();
      }
      window.toggleAuto = function() {
        on = !on;
        localStorage.setItem(STORAGE_KEY_ON, on ? 'on' : 'off');
        remaining = intervalSec;
        render();
      };
      window.changeInterval = function() {
        var v = parseInt(document.getElementById('intervalSel').value, 10);
        intervalSec = v;
        localStorage.setItem(STORAGE_KEY_INT, String(v));
        remaining = v;
        render();
      };
      render();
      setInterval(tick, 1000);
    })();
    window.togglePwd = function(){
      var el = document.getElementById('pwdPlain');
      var btn = document.getElementById('pwdBtn');
      if (!el || !btn) return;
      if (el.hasAttribute('hidden')) {
        el.removeAttribute('hidden');
        btn.textContent = 'hide plain password';
        btn.classList.add('on');
      } else {
        el.setAttribute('hidden','');
        btn.textContent = 'show plain password';
        btn.classList.remove('on');
      }
    };
    (function(){
      var STORAGE_KEY = 'vsoDemoBoxOpen';
      var open = {};
      try { open = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch (e) { open = {}; }
      document.querySelectorAll('details.box[data-box]').forEach(function(el){
        var key = el.getAttribute('data-box');
        if (open[key]) el.setAttribute('open','');
        el.addEventListener('toggle', function(){
          open[key] = el.open;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(open)); } catch (e) {}
        });
      });
    })();
    </script>
    </body></html>"""


    @app.route("/")
    def index():
        global counter
        counter += 1
        creds = read_credentials()
        uptime_s = int((datetime.now(timezone.utc) - POD_START).total_seconds())
        uptime = f"{uptime_s // 60}m {uptime_s % 60:02d}s"
        return render_template_string(
            PAGE,
            db_user=creds.get("username", "(no creds yet)"),
            pwd_fp=pwd_hash(creds.get("password", "")),
            pwd_plain=creds.get("password", "(no creds yet)"),
            updated=creds.get("updated", "never"),
            uptime=uptime,
            pod_start=POD_START.strftime("%Y-%m-%d %H:%M:%S UTC"),
            pod_name=POD_NAME,
            counter=counter,
            static_html=hl_json(read_static_config()),
            pki_html=hl_json(read_pki_cert()),
            dynamic_links=src_links("dynamic"),
            static_links=src_links("static"),
            pki_links=src_links("pki"),
            **VAULT_META,
        )


    @app.route("/api/info")
    def api_info():
        creds = read_credentials()
        uptime_s = int((datetime.now(timezone.utc) - POD_START).total_seconds())
        return jsonify({
            "pod_name": POD_NAME,
            "pod_uptime_seconds": uptime_s,
            "pod_started_at_utc": POD_START.isoformat(),
            "db_user": creds.get("username", ""),
            "db_password_hash": pwd_hash(creds.get("password", "")),
            "creds_last_updated": creds.get("updated", "never"),
            "static_config": read_static_config(),
            "pki_cert": read_pki_cert(),
            "pattern": "three VSO patterns, single pod, no restart",
        })


    @app.route("/healthz")
    def healthz():
        return "ok", 200


    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=8080)
  sidecar.sh: |
    #!/usr/bin/env bash
    # Credential-monitor sidecar.
    #
    # Polls the K8s Secret `db-creds` (kept in sync with Vault by VSO) and writes
    # the current values to /shared/credentials.txt. The Flask container re-reads
    # that file on every HTTP request, so credential rotation happens without a
    # pod restart.
    #
    # Inputs:
    #   NAMESPACE   - the namespace the pod runs in (defaulted by the Deployment).
    #   POLL_SECONDS - how often to refresh from the API (default: 3).
    set -euo pipefail

    NAMESPACE="${NAMESPACE:-vso-demo}"
    POLL_SECONDS="${POLL_SECONDS:-3}"

    echo "[sidecar] starting credential monitor (namespace=${NAMESPACE}, poll=${POLL_SECONDS}s)"

    while true; do
      U=$(kubectl get secret db-creds -n "${NAMESPACE}" -o jsonpath='{.data.username}' 2>/dev/null | base64 -d 2>/dev/null || true)
      P=$(kubectl get secret db-creds -n "${NAMESPACE}" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d 2>/dev/null || true)
      TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      if [ -n "${U}" ] && [ -n "${P}" ]; then
        cat > /shared/credentials.txt <<EOF
    username=${U}
    password=${P}
    updated=${TS}
    EOF
        echo "[sidecar ${TS}] credentials refreshed: user=${U}"
      else
        echo "[sidecar ${TS}] waiting for secret db-creds..."
      fi
      sleep "${POLL_SECONDS}"
    done
