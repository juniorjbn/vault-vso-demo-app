---
# Code shared between the webapp (Flask UI) and the credential-monitor sidecar.
# - app.py             — Flask UI mostrando 3 padrões VSO num pod sem restart.
# - sidecar.sh         — polls o Secret db-creds e escreve /shared/credentials.txt.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vso-demo-app-code
  namespace: vso-demo
data:
  app.py: |
    import os, hashlib, socket, time, json
    from datetime import datetime, timezone, timedelta
    from flask import Flask, render_template_string, jsonify
    from cryptography import x509
    from cryptography.hazmat.primitives import hashes
    from pygments import highlight
    from pygments.lexers import JsonLexer
    from pygments.formatters import HtmlFormatter

    TZ_BRT = timezone(timedelta(hours=-3), name='BRT')
    app = Flask(__name__)
    POD_START = datetime.now(TZ_BRT)
    POD_NAME = os.getenv('HOSTNAME', socket.gethostname())
    CREDS_FILE = '/shared/credentials.txt'
    STATIC_DIR = '/static-config'
    PKI_CRT = '/tls/tls.crt'
    counter = 0

    def read_credentials():
        """Le credenciais do volume compartilhado (atualizado pelo sidecar)."""
        try:
            with open(CREDS_FILE, 'r') as f:
                data = {}
                for line in f:
                    if '=' in line:
                        k, v = line.strip().split('=', 1)
                        data[k] = v
                return data
        except FileNotFoundError:
            return {}

    def read_static_config():
        """Le secret K8s sidecar-static-config (montado pelo VSO Static)."""
        if not os.path.isdir(STATIC_DIR):
            return {'_status': 'aguardando VSO sincronizar...'}
        result = {}
        try:
            for key in sorted(os.listdir(STATIC_DIR)):
                if key.startswith('.'):
                    continue
                path = os.path.join(STATIC_DIR, key)
                if os.path.isfile(path):
                    with open(path) as f:
                        result[key] = f.read().strip()
            return result if result else {'_status': 'secret vazio'}
        except Exception as e:
            return {'_error': str(e)}

    def read_pki_cert():
        """Le cert TLS dinamico (renovado a 67% do TTL pelo VSO PKI)."""
        if not os.path.isfile(PKI_CRT):
            return {'_status': 'aguardando emissao do cert...'}
        try:
            with open(PKI_CRT, 'rb') as f:
                pem = f.read()
            cert = x509.load_pem_x509_certificate(pem)
            fp = cert.fingerprint(hashes.SHA256()).hex()
            now = datetime.now(timezone.utc)
            remaining_s = int((cert.not_valid_after_utc - now).total_seconds())
            return {
                'subject': cert.subject.rfc4514_string(),
                'issuer': cert.issuer.rfc4514_string(),
                'serial_hex': format(cert.serial_number, 'x'),
                'not_valid_before_utc': cert.not_valid_before_utc.isoformat(),
                'not_valid_after_utc': cert.not_valid_after_utc.isoformat(),
                'remaining_seconds': remaining_s,
                'signature_algorithm': cert.signature_algorithm_oid._name,
                'public_key_size_bits': cert.public_key().key_size,
                'fingerprint_sha256': ':'.join(fp[i:i+2] for i in range(0, len(fp), 2)),
            }
        except Exception as e:
            return {'_error': str(e)}

    def hl_json(data):
        """Renderiza dict como JSON colorido (jq-like) via Pygments."""
        js = json.dumps(data, indent=2, ensure_ascii=False, sort_keys=False)
        return highlight(js, JsonLexer(),
            HtmlFormatter(style='monokai', noclasses=True, nobackground=True))

    def pwd_hash(pwd):
        if not pwd:
            return 'n/a'
        h = hashlib.sha256(pwd.encode()).hexdigest()
        return f'sha256:{h[:12]}'

    PAGE = """<!DOCTYPE html><html lang="pt-br"><head>
    <meta charset="utf-8"><title>Vault — Sidecar Refresh (sem restart)</title>
    <style>
    body{font-family:-apple-system,Segoe UI,sans-serif;max-width:920px;margin:1.5em auto;padding:1.5em;background:#0f172a;color:#e2e8f0}
    h1{color:#a855f7;margin:0 0 .3em 0;font-size:1.7em}
    .sub{color:#94a3b8;margin-bottom:1.5em}
    .box{background:#1e293b;padding:1.2em 1.5em;border-radius:10px;margin:.8em 0;border-left:4px solid #3b82f6}
    .box.cred{border-color:#22c55e}
    .box.timer{border-color:#fbbf24}
    .box.flow{border-color:#a855f7;font-size:.95em}
    .box.static{border-color:#0ea5e9}
    .box.pki{border-color:#f43f5e}
    .jq{font-family:'SF Mono',Consolas,monospace;font-size:.85em;line-height:1.5;background:#0b1220;padding:1em;border-radius:6px;overflow-x:auto;margin:.5em 0}
    .jq pre{margin:0;color:#e2e8f0}
    .hint{color:#94a3b8;font-size:.8em;margin-top:.4em;font-style:italic}
    .label{color:#64748b;font-size:.78em;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4em}
    .val{font-family:'SF Mono',Consolas,monospace;font-size:1em;line-height:1.6;word-break:break-all;color:#f1f5f9}
    .big{font-size:1.3em;font-weight:600;color:#22c55e}
    .timer-big{font-size:2em;font-weight:600;color:#fbbf24;font-family:'SF Mono',Consolas,monospace}
    .step{margin:.3em 0;padding-left:1.5em;text-indent:-1.5em}
    .step::before{content:"→ ";color:#a855f7}
    .pod{color:#7dd3fc;font-family:'SF Mono',Consolas,monospace}
    .footer{margin-top:2em;color:#64748b;font-size:.75em;text-align:center}
    .controls{position:sticky;top:0;background:#1e293b;padding:.8em 1em;border-radius:8px;margin:0 0 1.2em 0;display:flex;align-items:center;gap:1em;flex-wrap:wrap;border:1px solid #334155;z-index:10}
    .controls button{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:.5em 1em;border-radius:6px;font-size:.9em;cursor:pointer;font-family:inherit;transition:all .15s}
    .controls button:hover{background:#475569}
    .controls button.on{background:#22c55e;border-color:#16a34a;color:#0f172a;font-weight:600}
    .controls button.off{background:#ef4444;border-color:#b91c1c;color:white;font-weight:600}
    .controls .countdown{color:#fbbf24;font-family:'SF Mono',Consolas,monospace;font-size:.9em;margin-left:auto}
    .controls select{background:#0b1220;color:#e2e8f0;border:1px solid #475569;padding:.45em .7em;border-radius:6px;font-size:.9em;font-family:inherit}
    </style>
    </head><body>
    <h1>🔄 Vault — Sidecar Refresh (pod NUNCA restarta)</h1>
    <p class="sub">Sidecar le credenciais do K8s Secret e escreve em <code>/shared/credentials.txt</code>. Esta app re-le do arquivo a cada request. Quando o VSO atualiza o Secret (renovacao do lease Vault), o sidecar copia pro volume. Webapp continua rodando — sem rolloutRestartTargets.</p>

    <div class="controls">
      <button id="toggleBtn" onclick="toggleAuto()">⏸ Pausar</button>
      <button onclick="window.location.reload()">🔄 Atualizar agora</button>
      <label>Intervalo:
        <select id="intervalSel" onchange="changeInterval()">
          <option value="3">3s (rápido)</option>
          <option value="10" selected>10s (normal)</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
          <option value="0">manual</option>
        </select>
      </label>
      <span class="countdown" id="countdown">próximo: 10s</span>
    </div>

    <div class="box cred">
      <div class="label">Credenciais ATUAIS (lidas agora do volume)</div>
      <div class="val">Usuario PostgreSQL: <span class="big">{{ db_user }}</span></div>
      <div class="val">Senha (sha256, 12 chars): <span class="big">{{ pwd_fp }}</span></div>
      <div class="val">Ultimo update do sidecar: {{ updated }}</div>
    </div>

    <div class="box timer">
      <div class="label">Tempo de vida deste pod</div>
      <div class="timer-big">{{ uptime }}</div>
      <div class="val">iniciado em {{ pod_start }} · pod: <span class="pod">{{ pod_name }}</span></div>
      <div class="val">Se este uptime so cresce, o pod NUNCA reiniciou.</div>
    </div>

    <div class="box static">
      <div class="label">VSO Static — KV demo/data/sidecar/static-config (refreshAfter 30s)</div>
      <div class="jq">{{ static_html|safe }}</div>
      <div class="hint">Edite no Vault e aguarde ≤30s — a UI atualiza sem o pod reiniciar.</div>
    </div>

    <div class="box pki">
      <div class="label">VSO PKI — cert TLS pki-int/demo-app (TTL 5min, renovacao automatica)</div>
      <div class="jq">{{ pki_html|safe }}</div>
      <div class="hint">Serial e datas mudam a cada ~3min20s. VSO renova o cert no K8s Secret, kubelet remonta o arquivo, pod nao restarta.</div>
    </div>

    <div class="box flow">
      <div class="label">Sidecar pattern</div>
      <div class="step">VaultDynamicSecret cria credencial PG TTL 90s, max 2m</div>
      <div class="step">Sidecar (bitnami/kubectl) faz <code>kubectl get secret db-creds</code> a cada 3s</div>
      <div class="step">Escreve <code>/shared/credentials.txt</code> no volume <code>emptyDir</code> compartilhado</div>
      <div class="step">Webapp Flask le do arquivo a cada request (<code>read_credentials()</code>)</div>
      <div class="step">VSO renova lease a ~67% da vida util → K8s Secret atualizado</div>
      <div class="step">Sidecar detecta em ate 3s → arquivo atualizado → proxima request ve nova credencial</div>
      <div class="step"><strong>Pod uptime cresce continuamente. Sem restart, sem service gap.</strong></div>
    </div>

    <div class="footer">request #{{ counter }} · controle de refresh no topo</div>
    <script>
    (function(){
      var STORAGE_KEY_ON = 'sidecarAutoRefresh';
      var STORAGE_KEY_INT = 'sidecarRefreshInterval';
      var on = localStorage.getItem(STORAGE_KEY_ON) !== 'off';
      var intervalSec = parseInt(localStorage.getItem(STORAGE_KEY_INT) || '10', 10);
      if (isNaN(intervalSec)) intervalSec = 10;
      var remaining = intervalSec;
      var tickId = null;
      function render() {
        var btn = document.getElementById('toggleBtn');
        var cd = document.getElementById('countdown');
        var sel = document.getElementById('intervalSel');
        if (sel) sel.value = intervalSec === 0 ? '0' : String(intervalSec);
        if (intervalSec === 0) {
          btn.textContent = '✋ Modo manual';
          btn.className = 'off';
          cd.textContent = 'refresh manual apenas';
          return;
        }
        if (on) {
          btn.textContent = '⏸ Pausar auto-refresh';
          btn.className = 'on';
          cd.textContent = 'próximo: ' + remaining + 's';
        } else {
          btn.textContent = '▶ Retomar auto-refresh';
          btn.className = 'off';
          cd.textContent = 'pausado';
        }
      }
      function tick() {
        if (!on || intervalSec === 0) return;
        remaining--;
        if (remaining <= 0) { window.location.reload(); return; }
        render();
      }
      window.toggleAuto = function() {
        on = !on;
        localStorage.setItem(STORAGE_KEY_ON, on ? 'on' : 'off');
        remaining = intervalSec;
        render();
      };
      window.changeInterval = function() {
        var v = parseInt(document.getElementById('intervalSel').value, 10);
        intervalSec = v;
        localStorage.setItem(STORAGE_KEY_INT, String(v));
        remaining = v;
        render();
      };
      render();
      setInterval(tick, 1000);
    })();
    </script>
    </body></html>"""

    @app.route('/')
    def index():
        global counter
        counter += 1
        creds = read_credentials()
        uptime_s = int((datetime.now(TZ_BRT) - POD_START).total_seconds())
        uptime = f'{uptime_s // 60}m {uptime_s % 60:02d}s'
        return render_template_string(PAGE,
            db_user=creds.get('username', '(no creds yet)'),
            pwd_fp=pwd_hash(creds.get('password', '')),
            updated=creds.get('updated', 'never'),
            uptime=uptime,
            pod_start=POD_START.strftime('%Y-%m-%d %H:%M:%S (BRT)'),
            pod_name=POD_NAME,
            counter=counter,
            static_html=hl_json(read_static_config()),
            pki_html=hl_json(read_pki_cert()))

    @app.route('/api/info')
    def api_info():
        creds = read_credentials()
        uptime_s = int((datetime.now(TZ_BRT) - POD_START).total_seconds())
        return jsonify({
            'pod_name': POD_NAME,
            'pod_uptime_seconds': uptime_s,
            'pod_started_at_brt': POD_START.isoformat(),
            'db_user': creds.get('username', ''),
            'db_password_hash': pwd_hash(creds.get('password', '')),
            'creds_last_updated': creds.get('updated', 'never'),
            'static_config': read_static_config(),
            'pki_cert': read_pki_cert(),
            'pattern': 'sidecar-refresh (no pod restart)',
        })

    @app.route('/healthz')
    def healthz():
        return 'ok', 200

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)

  sidecar.sh: |
    #!/bin/bash
    echo "[sidecar] iniciando monitor de credenciais (poll ${POLL_SECONDS:-3}s)"
    while true; do
      U=$(kubectl get secret db-creds -n "${NAMESPACE:-vso-demo}" -o jsonpath='{.data.username}' 2>/dev/null | base64 -d 2>/dev/null)
      P=$(kubectl get secret db-creds -n "${NAMESPACE:-vso-demo}" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d 2>/dev/null)
      TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      if [ -n "$U" ] && [ -n "$P" ]; then
        cat > /shared/credentials.txt <<INNER
    username=$U
    password=$P
    updated=$TS
    INNER
        echo "[sidecar $TS] credenciais atualizadas: user=$U"
      else
        echo "[sidecar $TS] aguardando secret db-creds..."
      fi
      sleep "${POLL_SECONDS:-3}"
    done

